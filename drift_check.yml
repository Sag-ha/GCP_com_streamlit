name: Scheduled Drift Check

on:
  schedule:
    - cron: '0 9 * * 1'   # every Monday 9am UTC
  workflow_dispatch:        # also runnable manually from the Actions tab

jobs:
  check-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v1
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}    

      - name: Install dependencies
        run: pip install pandas scipy mlflow google-cloud-storage requests

      - name: Run drift check
        env:
          MODEL_BUCKET: car-price-api-data
          REFERENCE_PATH: data/cars24-car-price-cleaned-new.csv
          MLFLOW_TRACKING_URI: http://YOUR_MLFLOW_VM_IP:5000
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python streamlit/check_drift.py
