# push to main
#    ↓
#download model from GCS (so pytest can load it)
#    ↓
#run pytest test_model.py   ← THIS STEP IS NEW
#    ↓ only if tests pass
#build image
#    ↓
#push to Artifact Registry
#    ↓
#deploy to Cloud Run


name: Build, Test and Deploy to GCP

on:
  push:
    branches: [main]
    paths:
      - 'streamlit/flask_app.py'
      - 'streamlit/gcs_logger.py'
      - 'streamlit/requirements.txt'
      - 'streamlit/Dockerfile'
      - 'streamlit/train.py'
      - 'streamlit/test_model.py'

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3


      - name: Authenticate to GCP
        uses: google-github-actions/auth@v1
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}    

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1

      # Download the current production model from GCS so pytest
      # can load it locally -- the pkl is never committed to git.
      - name: Download model for testing
        run: |
          gsutil cp gs://car-price-api-data/models/xgb_car_price_model.pkl \
            streamlit/xgb_car_price_model.pkl

      # Run tests first -- if either test fails, the job stops here
      # and nothing gets deployed. This is the gate.
      - name: Run tests
        run: |
          pip install pytest pandas numpy scikit-learn xgboost
          cd streamlit
          pytest test_model.py -v

      # Tests passed -- now build and push the image
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker asia-south1-docker.pkg.dev

      - name: Build image
        run: |
          cd streamlit
          docker build -t asia-south1-docker.pkg.dev/project-187652df-2a02-4a18-a45/my-app/car-price-api:latest .

      - name: Push image
        run: |
          docker push asia-south1-docker.pkg.dev/project-187652df-2a02-4a18-a45/my-app/car-price-api:latest

      # No --update-env-vars here on purpose: Cloud Run carries forward
      # MODEL_BUCKET and MODEL_PATH from the previous revision automatically.
      # Model rollouts are a separate deliberate step (run train.py, then
      # gcloud run deploy --update-env-vars MODEL_PATH=<new version>).
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy car-price-api \
            --image asia-south1-docker.pkg.dev/project-187652df-2a02-4a18-a45/my-app/car-price-api:latest \
            --platform managed \
            --region asia-south1 \
            --allow-unauthenticated \
            --port 5000
